<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aserrado de Madera</title>
  <style>
    body {
      background: linear-gradient(to right,#228b22, #4b5320);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    .tarjeta {
gap:40px;
background-color: white;
width:500px;
padding: 50px;
margin: 25px auto;
border-radius: 20px;
box-shadow: 0px 20px 25px gray;
text-align: center;
}
     
button {
background-color: #2980b9;
color: white;
border: none;
padding: 10px 20px;
border-radius: 10px;
cursor: pointer;
font-size: 16px;
margin: 5px;
transition: background 0.3s;
}
button:over{
background:43A047;
transform:tranlatey(-4px);
box-shadow:0 8px 15px;
}
.btn-regresar{
background:8B4513;
margin-top:30px;
}
.btn-regresar:hover{
backgroud:8B4513;
}
.menu-top{
tex-align:center;
margin-bottom:50px;
padding-top:20px;
}
.fila-imagenes{
display:grid;
grid-template-columns:repeat(3,1tr);
gap:15px;
margin:20px auto;
max-width:900px;
padding:0 15px;
}
.fila-imagenes img{
width:100%px;
height:200px;
object-fit:cover;
border-radius:10px;
box-shadow:0 4px 8px;
}
ul {
text-align: left;
margin: 20px 0;
</style>
</head>
<body>
<div class="tarjeta">
<div class="menu-top">
<button onclick="location.href='nosotros.html'">Nosotros</button>
<button onclick="location.href='contactos.html'">Contactos</button>
</div>
<h1>Nuestros Servicios</h1>
<img src="corte.JPEG"alt="corte a medida"width="125 height="125">
<img src="secado.JPEG"alt="secado industrial"width="125 height="125">
<img src="cepillado.JPEG"alt="cepillado y canteado"width="125 height="125">
<img src="camion.JPEG"alt="camion"width="125 height="125">
<img src="maderas.JPEG"alt="maderas"width="125 height="125">
<img src="muebles.JPEG"alt="muebles"width="125 height="125">
<div>
<button onclick="location.href='index.html'">inicio</button>
</div>
</div>
</body>
</html>
