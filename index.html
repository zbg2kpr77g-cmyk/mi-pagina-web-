<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aserrado de Madera</title>
  <style>
    body {
      background: linear-gradient(to right, #228b22, #4b5320);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    .tarjeta {
gap:100px;
background-color: white;
width: 500px;
padding: 50px;
margin: 50px auto;
border-radius: 20px;
box-shadow: 0px 80px 25px gray;
text-align: center;
}
     
button {
background-color: #2980b9;
color: white;
border: none;
padding: 10px 20px;
border-radius: 10px;
cursor: pointer;
font-size: 16px;
margin: 5px;
transition: background 0.3s;
}
button:over{
background:43A047;
transform:tranlatey(-4px);
box-shadow:0 8px 15px;
}
.btn-regresar{
background:8B4513;
margin-top:30px;
}
.btn-regresar:hover{
backgroud:8B4513;
}
.menu-top{
tex-align:center;
margin-bottom:50px;
padding-top:20px;
}
.logo{
text-align:center;
margin-bottom:60px;
width:200px;
height 120px;
border-radius:15px;
border:4px;
margin:20px 0;
box-shadow: 0 5px 15px;
}
.banner{
text-align:center;
margin-top:60px;
max-width:400px;
margin:60 auto;
padding:10px 20px;
border-radius:8px;
font-weight:bold;
width:100%;
box-shadow:0 3 px 10px;
}
.banner img{
width:100%;
height:auto;
display:block;
}
 ul {
      text-align: left;
      margin: 20px 0;
   }
  </style>
</head>
<body>
  <div class="tarjeta">
<div class="menu-top">
<button onclick="location.href='nosotros.html'">Nosotros</button>
 <button onclick="location.href='servicios.html'">Servicios</button>
 <button onclick="location.href='contactos.html'">Contactos</button>
</div>
<img src="logo.PNG" alt="Logo aserradero" width="250" height="250">
<center>
<div class="banner">
<img src="banner-madera.jpg"alt="madera de calidad" width="100" height="350">
</center>
 </div>
</body>
</html>
